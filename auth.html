<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KevAI — Login</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Inter",sans-serif; background:#0a0a0f; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .card { background:rgba(18,18,28,0.97); border:1px solid rgba(108,63,197,0.3); border-radius:24px; padding:36px 32px; width:380px; box-shadow:0 0 60px rgba(108,63,197,0.15); }
    .logo { text-align:center; margin-bottom:24px; }
    .logo .emoji { font-size:48px; }
    .logo h1 { color:white; font-size:24px; margin-top:8px; }
    .logo p { color:#888; font-size:13px; margin-top:4px; }
    .tabs { display:flex; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; margin-bottom:24px; }
    .tab { flex:1; padding:8px; text-align:center; border-radius:8px; cursor:pointer; font-size:14px; color:#888; transition:all 0.2s; }
    .tab.active { background:linear-gradient(135deg,#6c3fc5,#8b5cf6); color:white; }
    .form { display:none; flex-direction:column; gap:12px; }
    .form.active { display:flex; }
    .input-group { display:flex; flex-direction:column; gap:4px; }
    .input-group label { font-size:12px; color:#888; }
    .input-group input, .input-group select { padding:11px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; font-size:14px; outline:none; font-family:"Inter",sans-serif; }
    .input-group input:focus { border-color:#8b5cf6; }
    .input-group select { color:#ccc; }
    .input-group select option { background:#1a1a2e; color:white; }
    .submit-btn { padding:13px; border-radius:12px; background:linear-gradient(135deg,#6c3fc5,#8b5cf6); border:none; color:white; font-size:15px; font-weight:500; cursor:pointer; margin-top:4px; transition:opacity 0.2s; }
    .submit-btn:hover { opacity:0.9; }
    .error { color:#f87171; font-size:12px; text-align:center; padding:8px; background:rgba(248,113,113,0.1); border-radius:8px; display:none; }
    .divider { text-align:center; color:#555; font-size:12px; margin:4px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="emoji">🤖</div>
    <h1>KevAI</h1>
    <p>Your personal AI buddy</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Sign Up</div>
  </div>

  <div class="error" id="error-msg"></div>

  <!-- Login Form -->
  <div class="form active" id="login-form">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com"/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password"/>
    </div>
    <button class="submit-btn" onclick="login()">Login 🚀</button>
  </div>

  <!-- Register Form -->
  <div class="form" id="register-form">
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="Choose a username"/>
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="your@email.com"/>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Choose a password"/>
    </div>
    <div class="input-group">
      <label>Your City</label>
      <input type="text" id="reg-city" placeholder="e.g. Chennai, Mumbai, Delhi"/>
    </div>
    <div class="input-group">
      <label>AI Name</label>
      <input type="text" id="reg-ainame" placeholder="Name your AI (e.g. KevAI, Jarvis)"/>
    </div>
    <div class="input-group">
      <label>AI Personality</label>
      <select id="reg-personality">
        <option value="casual">😎 Casual Friend</option>
        <option value="professional">💼 Professional</option>
        <option value="coach">🔥 Life Coach</option>
        <option value="tutor">📚 Tutor</option>
        <option value="sarcastic">😂 Sarcastic</option>
      </select>
    </div>
    <button class="submit-btn" onclick="register()">Create Account 🎉</button>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", (i===0&&tab==="login")||(i===1&&tab==="register")));
    document.getElementById("login-form").classList.toggle("active", tab==="login");
    document.getElementById("register-form").classList.toggle("active", tab==="register");
    document.getElementById("error-msg").style.display = "none";
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  async function login() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    if (!email || !password) return showError("Please fill in all fields");
    const res = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) return showError(data.error);
    window.location.href = "/";
  }

  async function register() {
    const username = document.getElementById("reg-username").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const city = document.getElementById("reg-city").value.trim();
    const ai_name = document.getElementById("reg-ainame").value.trim() || "KevAI";
    const personality = document.getElementById("reg-personality").value;
    if (!username || !email || !password) return showError("Please fill in all required fields");
    const res = await fetch("/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, email, password, city, ai_name, personality })
    });
    const data = await res.json();
    if (data.error) return showError(data.error);
    window.location.href = "/";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (document.getElementById("login-form").classList.contains("active")) login();
      else register();
    }
  });
</script>
</body>
</html>
