<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KevAI — Your Personal AI</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Inter",sans-serif; background:#0a0a0f; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    .bg-glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(108,63,197,0.12),transparent 70%); top:-150px; left:50%; transform:translateX(-50%); pointer-events:none; }

    /* Onboarding */
    .onboarding { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(8px); }
    .onboard-card { background:#14141e; border:1px solid rgba(108,63,197,0.4); border-radius:24px; padding:32px; width:340px; text-align:center; }
    .onboard-card .big-emoji { font-size:48px; margin-bottom:12px; }
    .onboard-card h2 { color:white; font-size:20px; margin-bottom:6px; }
    .onboard-card p { color:#888; font-size:13px; margin-bottom:20px; }
    .onboard-input { width:100%; padding:12px 16px; border-radius:12px; border:1px solid rgba(108,63,197,0.3); background:rgba(255,255,255,0.05); color:white; font-size:14px; outline:none; margin-bottom:10px; font-family:"Inter",sans-serif; }
    .onboard-input:focus { border-color:#8b5cf6; }
    .onboard-btn { width:100%; padding:12px; border-radius:12px; background:linear-gradient(135deg,#6c3fc5,#8b5cf6); border:none; color:white; font-size:14px; font-weight:500; cursor:pointer; transition:opacity 0.2s; }
    .onboard-btn:hover { opacity:0.9; }

    .container { width:430px; height:760px; background:rgba(18,18,28,0.97); border-radius:24px; display:flex; flex-direction:column; overflow:hidden; border:1px solid rgba(108,63,197,0.25); box-shadow:0 0 60px rgba(108,63,197,0.15); position:relative; z-index:1; }

    /* Header */
    .header { background:linear-gradient(135deg,#6c3fc5,#4a2d8a); padding:14px 18px; display:flex; align-items:center; gap:12px; }
    .avatar-wrap { position:relative; }
    .avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid rgba(255,255,255,0.3); }
    .status-dot { width:10px; height:10px; background:#4ade80; border-radius:50%; position:absolute; bottom:1px; right:1px; border:2px solid #4a2d8a; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    .header-text { flex:1; }
    .header-text h1 { color:white; font-size:15px; font-weight:600; }
    .header-text p { color:rgba(255,255,255,0.6); font-size:11px; }
    .mood-badge { font-size:11px; padding:2px 8px; border-radius:99px; background:rgba(255,255,255,0.15); color:white; margin-top:3px; display:inline-block; }
    .header-btns { display:flex; gap:6px; }
    .icon-btn { background:rgba(255,255,255,0.15); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .icon-btn:hover { background:rgba(255,255,255,0.28); }

    /* Briefing */
    .briefing { background:rgba(108,63,197,0.1); border-bottom:1px solid rgba(108,63,197,0.2); padding:8px 16px; display:flex; flex-direction:column; gap:3px; }
    .briefing-row { display:flex; align-items:center; gap:8px; font-size:11px; color:#a78bfa; }
    .briefing-row span { color:#ccc; }

    /* Messages */
    .messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
    .messages::-webkit-scrollbar { width:3px; }
    .messages::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
    .msg-row { display:flex; align-items:flex-end; gap:8px; animation:fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction:row-reverse; }
    .msg-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; background:rgba(108,63,197,0.3); }
    .msg-row.user .msg-avatar { background:rgba(108,63,197,0.5); }
    .msg-content { display:flex; flex-direction:column; gap:3px; max-width:76%; }
    .msg-row.user .msg-content { align-items:flex-end; }
    .message { padding:9px 13px; border-radius:18px; font-size:13.5px; line-height:1.55; word-break:break-word; }
    .user-msg { background:linear-gradient(135deg,#6c3fc5,#8b5cf6); color:white; border-bottom-right-radius:4px; }
    .ai-msg { background:rgba(255,255,255,0.06); color:#e8e8f0; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.08); }
    .msg-time { font-size:10px; color:#444; padding:0 4px; }
    .intent-badge { font-size:10px; padding:2px 7px; border-radius:99px; margin-bottom:3px; display:inline-block; }
    .intent-search { background:rgba(59,130,246,0.2); color:#93c5fd; }
    .intent-weather { background:rgba(16,185,129,0.2); color:#6ee7b7; }
    .intent-calculate { background:rgba(245,158,11,0.2); color:#fcd34d; }

    /* Typing */
    .typing-row { display:flex; align-items:flex-end; gap:8px; }
    .typing-bubble { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); padding:11px 15px; border-radius:18px; border-bottom-left-radius:4px; display:flex; gap:5px; align-items:center; }
    .dot { width:6px; height:6px; background:#6c3fc5; border-radius:50%; animation:bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Modes */
    .modes { display:flex; gap:6px; padding:0 14px 8px; overflow-x:auto; flex-shrink:0; }
    .modes::-webkit-scrollbar{display:none}
    .mode-chip { background:rgba(108,63,197,0.1); border:1px solid rgba(108,63,197,0.22); color:#a78bfa; padding:5px 11px; border-radius:99px; font-size:11px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
    .mode-chip:hover { background:rgba(108,63,197,0.25); color:white; }
    .mode-chip.active { background:rgba(108,63,197,0.38); color:white; border-color:#8b5cf6; }

    /* Input area */
    .input-wrapper { padding:10px 14px 14px; border-top:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; gap:8px; }
    .input-row { display:flex; gap:8px; align-items:center; }
    input[type=text] { flex:1; padding:11px 15px; border-radius:99px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; font-size:13.5px; outline:none; font-family:"Inter",sans-serif; transition:border 0.2s; }
    input[type=text]::placeholder{color:#444}
    input[type=text]:focus { border-color:rgba(108,63,197,0.6); }
    .send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#6c3fc5,#8b5cf6); border:none; color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; flex-shrink:0; }
    .send-btn:hover{transform:scale(1.08)} .send-btn:active{transform:scale(0.94)}
    .upload-row { display:flex; align-items:center; gap:8px; }
    .upload-btn { background:rgba(108,63,197,0.15); border:1px solid rgba(108,63,197,0.25); color:#a78bfa; padding:5px 12px; border-radius:99px; font-size:11px; cursor:pointer; transition:all 0.2s; }
    .upload-btn:hover { background:rgba(108,63,197,0.3); color:white; }
    .upload-status { font-size:11px; color:#4ade80; }
    .city-input { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; padding:4px 10px; border-radius:99px; font-size:11px; outline:none; width:110px; font-family:"Inter",sans-serif; }
    .city-input::placeholder { color:#444; }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<!-- Onboarding -->
<div class="onboarding" id="onboarding">
  <div class="onboard-card">
    <div class="big-emoji">🤖</div>
    <h2>Welcome to KevAI</h2>
    <p>Your personal AI buddy — tell me a bit about yourself so I can make this personal for you!</p>
    <input class="onboard-input" id="onboard-name" placeholder="What is your name?" maxlength="30"/>
    <input class="onboard-input" id="onboard-city" placeholder="Your city (for weather)" maxlength="30"/>
    <button class="onboard-btn" onclick="startChat()">Let's go! 🔥</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar">🤖</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-text">
      <h1 id="ai-title">KevAI</h1>
      <p>Personal AI buddy — always online</p>
      <div class="mood-badge" id="mood-badge">😊 Good vibes</div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" onclick="clearChat()" title="Clear">🗑️</button>
    </div>
  </div>

  <div class="briefing" id="briefing">
    <div class="briefing-row">🌤️ <span id="b-weather">Loading...</span></div>
    <div class="briefing-row">💬 <span id="b-quote">Loading...</span></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="modes">
    <div class="mode-chip active" onclick="setMode(this,'normal mode')">😎 Normal</div>
    <div class="mode-chip" onclick="setMode(this,'study mode')">📚 Study</div>
    <div class="mode-chip" onclick="setMode(this,'motivate me')">🔥 Hype</div>
    <div class="mode-chip" onclick="setMode(this,'roast me')">😂 Roast</div>
    <div class="mode-chip" onclick="setMode(this,'chill mode')">😴 Chill</div>
  </div>

  <div class="input-wrapper">
    <div class="upload-row">
      <label class="upload-btn">
        📄 Upload PDF
        <input type="file" accept=".pdf" style="display:none" onchange="uploadPDF(this)"/>
      </label>
      <span class="upload-status" id="upload-status"></span>
      <input class="city-input" id="city-input" placeholder="📍 Your city"/>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Ask me anything..."/>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const moodBadge = document.getElementById("mood-badge");
  let chatHistory = [];
  let userName = "there";
  let userCity = "Chennai";

  const moodMap = {
    neutral:  { emoji:"😊", label:"Good vibes" },
    happy:    { emoji:"🔥", label:"Hyped up!" },
    stressed: { emoji:"😤", label:"Stressed" },
    sad:      { emoji:"💙", label:"Feeling down" },
    angry:    { emoji:"😤", label:"Fired up" },
    bored:    { emoji:"😴", label:"Bored" }
  };

  const intentLabels = {
    search:    { cls:"intent-search",    label:"🔍 Web search" },
    weather:   { cls:"intent-weather",   label:"🌤️ Weather" },
    calculate: { cls:"intent-calculate", label:"🔢 Calculator" }
  };

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  function getTime() {
    return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  }

  function updateMood(mood) {
    const m = moodMap[mood] || moodMap.neutral;
    moodBadge.textContent = m.emoji + " " + m.label;
  }

  function addMessage(role, text, intent) {
    const row = document.createElement("div");
    row.className = "msg-row" + (role === "user" ? " user" : "");

    let intentBadge = "";
    if (intent && intentLabels[intent]) {
      const il = intentLabels[intent];
      intentBadge = `<div class="intent-badge ${il.cls}">${il.label}</div>`;
    }

    row.innerHTML = role === "user"
      ? `<div class="msg-avatar">👤</div>
         <div class="msg-content">
           <div class="message user-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
         </div>`
      : `<div class="msg-avatar">🤖</div>
         <div class="msg-content">
           ${intentBadge}
           <div class="message ai-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
         </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";
    row.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    const city = document.getElementById("city-input").value || userCity;

    addMessage("user", text);
    chatHistory.push({"role":"user","content":text});
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          message: text,
          history: chatHistory,
          userName: userName,
          userCity: city
        })
      });
      const data = await res.json();
      removeTyping();
      addMessage("ai", data.reply, data.intent);
      chatHistory.push({"role":"assistant","content":data.reply});
      if (data.mood) updateMood(data.mood);
    } catch(e) {
      removeTyping();
      addMessage("ai", "Something went wrong 😅 try again!");
    }
  }

  function setMode(el, mode) {
    document.querySelectorAll(".mode-chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("input").value = mode;
    sendMessage();
  }

  function clearChat() {
    chatHistory = [];
    messagesEl.innerHTML = "";
    addMessage("ai", `Fresh start! What's on your mind, ${userName}? 🔥`);
    updateMood("neutral");
  }

  async function uploadPDF(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById("upload-status");
    statusEl.textContent = "Uploading...";
    const formData = new FormData();
    formData.append("file", file);
    try {
      const res = await fetch("/upload", { method:"POST", body: formData });
      const data = await res.json();
      if (data.success) {
        statusEl.textContent = `✅ ${file.name} (${data.pages} pages)`;
        addMessage("ai", `Got your PDF bro! 📄 It has ${data.pages} pages. Ask me anything about it!`);
      } else {
        statusEl.textContent = "❌ Upload failed";
      }
    } catch(e) {
      statusEl.textContent = "❌ Error";
    }
  }

  async function loadBriefing(city) {
    try {
      const res = await fetch(`/briefing?city=${city}`);
      const data = await res.json();
      document.getElementById("b-weather").textContent = data.weather;
      document.getElementById("b-quote").textContent = data.quote;
      addMessage("ai", `${data.greeting}, ${userName}! 👋 ${data.weather} — ${data.quote} What's good today? 🔥`);
    } catch(e) {
      addMessage("ai", `Hey ${userName}! I'm KevAI 🤖 Your personal AI buddy. What's good today?`);
    }
  }

  function startChat() {
    const nameInput = document.getElementById("onboard-name").value.trim();
    const cityInput = document.getElementById("onboard-city").value.trim();
    userName = nameInput || "there";
    userCity = cityInput || "Chennai";
    document.getElementById("city-input").value = userCity;
    document.getElementById("ai-title").textContent = `${userName}'s AI`;
    document.getElementById("onboarding").style.display = "none";
    loadBriefing(userCity);
  }
</script>
</body>
</html>
