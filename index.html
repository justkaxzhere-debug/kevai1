<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#6c3fc5"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="KevAI"/>
<link rel="apple-touch-icon" href="/static/icon-192.png"/>
  <title>KevAI — Your Personal AI</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

    /* ===== THEMES ===== */
    [data-theme="dark"] {
      --bg: #0a0a0f;
      --container: rgba(18,18,28,0.97);
      --header-from: #6c3fc5;
      --header-to: #4a2d8a;
      --msg-ai: rgba(255,255,255,0.06);
      --msg-ai-border: rgba(255,255,255,0.08);
      --msg-user-from: #6c3fc5;
      --msg-user-to: #8b5cf6;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --text: #e8e8f0;
      --text-muted: #888;
      --border: rgba(108,63,197,0.25);
      --chip-bg: rgba(108,63,197,0.1);
      --chip-border: rgba(108,63,197,0.22);
      --chip-color: #a78bfa;
      --briefing-bg: rgba(108,63,197,0.1);
      --glow: rgba(108,63,197,0.15);
      --time: #444;
      --empty: #666;
    }
    [data-theme="light"] {
      --bg: #f0eef8;
      --container: #ffffff;
      --header-from: #7c3aed;
      --header-to: #5b21b6;
      --msg-ai: #f3f0ff;
      --msg-ai-border: #e0d9ff;
      --msg-user-from: #7c3aed;
      --msg-user-to: #8b5cf6;
      --input-bg: #f8f5ff;
      --input-border: #d8d0f0;
      --text: #1a1a2e;
      --text-muted: #666;
      --border: rgba(108,63,197,0.2);
      --chip-bg: #ede9ff;
      --chip-border: #c4b5fd;
      --chip-color: #6d28d9;
      --briefing-bg: #ede9ff;
      --glow: rgba(108,63,197,0.08);
      --time: #aaa;
      --empty: #aaa;
    }
    [data-theme="ocean"] {
      --bg: #020b18;
      --container: rgba(5,20,40,0.97);
      --header-from: #0369a1;
      --header-to: #075985;
      --msg-ai: rgba(255,255,255,0.05);
      --msg-ai-border: rgba(14,165,233,0.15);
      --msg-user-from: #0369a1;
      --msg-user-to: #0ea5e9;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(14,165,233,0.2);
      --text: #e0f2fe;
      --text-muted: #7dd3fc;
      --border: rgba(14,165,233,0.2);
      --chip-bg: rgba(14,165,233,0.1);
      --chip-border: rgba(14,165,233,0.25);
      --chip-color: #7dd3fc;
      --briefing-bg: rgba(14,165,233,0.08);
      --glow: rgba(14,165,233,0.12);
      --time: #555;
      --empty: #555;
    }
    [data-theme="forest"] {
      --bg: #020d05;
      --container: rgba(5,20,10,0.97);
      --header-from: #166534;
      --header-to: #14532d;
      --msg-ai: rgba(255,255,255,0.05);
      --msg-ai-border: rgba(34,197,94,0.15);
      --msg-user-from: #166534;
      --msg-user-to: #22c55e;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(34,197,94,0.2);
      --text: #dcfce7;
      --text-muted: #86efac;
      --border: rgba(34,197,94,0.2);
      --chip-bg: rgba(34,197,94,0.1);
      --chip-border: rgba(34,197,94,0.25);
      --chip-color: #86efac;
      --briefing-bg: rgba(34,197,94,0.08);
      --glow: rgba(34,197,94,0.12);
      --time: #555;
      --empty: #555;
    }
    [data-theme="sunset"] {
      --bg: #0f050a;
      --container: rgba(25,8,15,0.97);
      --header-from: #be123c;
      --header-to: #9f1239;
      --msg-ai: rgba(255,255,255,0.05);
      --msg-ai-border: rgba(251,113,133,0.15);
      --msg-user-from: #be123c;
      --msg-user-to: #f43f5e;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(251,113,133,0.2);
      --text: #ffe4e6;
      --text-muted: #fda4af;
      --border: rgba(251,113,133,0.2);
      --chip-bg: rgba(251,113,133,0.1);
      --chip-border: rgba(251,113,133,0.25);
      --chip-color: #fda4af;
      --briefing-bg: rgba(251,113,133,0.08);
      --glow: rgba(251,113,133,0.12);
      --time: #555;
      --empty: #555;
    }

    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 0.4s;
    }
    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ===== ONBOARDING ===== */
    .onboarding {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .onboard-card {
      background: var(--container);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      width: 340px;
      text-align: center;
    }
    .onboard-card .big-emoji { font-size: 48px; margin-bottom: 12px; }
    .onboard-card h2 { color: var(--text); font-size: 20px; margin-bottom: 6px; }
    .onboard-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
    .onboard-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 10px;
      font-family: "Inter", sans-serif;
    }
    .onboard-input:focus { border-color: var(--header-from); }
    .onboard-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    /* ===== THEME PICKER (Onboarding) ===== */
    .theme-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .theme-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active { border-color: white; }
    .theme-dot[data-t="dark"]   { background: linear-gradient(135deg, #6c3fc5, #0a0a0f); }
    .theme-dot[data-t="light"]  { background: linear-gradient(135deg, #7c3aed, #f0eef8); }
    .theme-dot[data-t="ocean"]  { background: linear-gradient(135deg, #0369a1, #020b18); }
    .theme-dot[data-t="forest"] { background: linear-gradient(135deg, #166534, #020d05); }
    .theme-dot[data-t="sunset"] { background: linear-gradient(135deg, #be123c, #0f050a); }

    /* ===== MAIN CONTAINER ===== */
    .container {
      width: 430px;
      height: 780px;
      background: var(--container);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px var(--glow);
      position: relative;
      z-index: 1;
      transition: background 0.4s;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-wrap { position: relative; cursor: pointer; }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: transform 0.3s;
    }
    .avatar.talking { animation: avatarTalk 0.4s ease infinite alternate; }
    .avatar.idle    { animation: avatarIdle 3s ease infinite; }
    @keyframes avatarTalk { from { transform: scale(1) rotate(-3deg); } to { transform: scale(1.12) rotate(3deg); } }
    @keyframes avatarIdle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .status-dot {
      width: 10px; height: 10px;
      background: #4ade80;
      border-radius: 50%;
      position: absolute; bottom: 1px; right: 1px;
      border: 2px solid var(--header-to);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .header-text { flex: 1; }
    .header-text h1 { color: white; font-size: 15px; font-weight: 600; }
    .header-text p  { color: rgba(255,255,255,0.6); font-size: 11px; }
    .mood-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(255,255,255,0.15);
      color: white;
      margin-top: 3px;
      display: inline-block;
      transition: all 0.3s;
    }
    .header-btns { display: flex; gap: 6px; }
    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.28); }

    /* ===== THEME PANEL ===== */
    .theme-panel {
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      display: none;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .theme-panel.open { display: flex; }
    .theme-panel span { color: rgba(255,255,255,0.7); font-size: 11px; }
    .tp-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }
    .tp-dot:hover { transform: scale(1.2); }
    .tp-dot.active { border-color: white; }
    .tp-dot[data-t="dark"]   { background: linear-gradient(135deg, #6c3fc5, #0a0a0f); }
    .tp-dot[data-t="light"]  { background: linear-gradient(135deg, #7c3aed, #f3f4f6); }
    .tp-dot[data-t="ocean"]  { background: linear-gradient(135deg, #0369a1, #020b18); }
    .tp-dot[data-t="forest"] { background: linear-gradient(135deg, #166534, #020d05); }
    .tp-dot[data-t="sunset"] { background: linear-gradient(135deg, #be123c, #0f050a); }

    /* ===== BRIEFING BAR ===== */
    .briefing {
      background: var(--briefing-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .briefing-row { display: flex; gap: 8px; font-size: 11px; color: var(--chip-color); }
    .briefing-row span { color: var(--text-muted); }

    /* ===== MESSAGES ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      background: var(--chip-bg);
    }
    .msg-row.user .msg-avatar { background: rgba(108,63,197,0.4); }
    .msg-content { display: flex; flex-direction: column; gap: 3px; max-width: 76%; }
    .msg-row.user .msg-content { align-items: flex-end; }
    .message {
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
      color: var(--text);
    }
    .user-msg {
      background: linear-gradient(135deg, var(--msg-user-from), var(--msg-user-to));
      color: white !important;
      border-bottom-right-radius: 4px;
    }
    .ai-msg {
      background: var(--msg-ai);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--msg-ai-border);
    }
    .msg-time { font-size: 10px; color: var(--time); padding: 0 4px; }

    /* ===== REACTIONS ===== */
    .reactions { display: flex; gap: 4px; padding: 0 4px; }
    .react-btn {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      border-radius: 99px;
      padding: 2px 7px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }
    .react-btn:hover { background: var(--chip-border); }
    .react-btn.active { background: var(--chip-border); color: var(--text); }
    .react-count { font-size: 10px; margin-left: 2px; }

    /* ===== INTENT BADGES ===== */
    .intent-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      margin-bottom: 3px;
      display: inline-block;
    }
    .intent-search    { background: rgba(59,130,246,0.2);  color: #93c5fd; }
    .intent-weather   { background: rgba(16,185,129,0.2);  color: #6ee7b7; }
    .intent-calculate { background: rgba(245,158,11,0.2);  color: #fcd34d; }

    /* ===== TYPING INDICATOR ===== */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      background: var(--msg-ai);
      border: 1px solid var(--msg-ai-border);
      padding: 11px 15px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--header-from);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* ===== MODE CHIPS ===== */
    .modes {
      display: flex; gap: 6px;
      padding: 0 14px 8px;
      overflow-x: auto; flex-shrink: 0;
    }
    .modes::-webkit-scrollbar { display: none; }
    .mode-chip {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--chip-color);
      padding: 5px 11px;
      border-radius: 99px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .mode-chip:hover  { opacity: 0.8; }
    .mode-chip.active { opacity: 1; border-color: var(--header-from); color: var(--text); }

    /* ===== INPUT AREA ===== */
    .input-wrapper {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    input[type=text], .city-input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      font-family: "Inter", sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    input[type=text] {
      flex: 1;
      padding: 11px 15px;
      border-radius: 99px;
      font-size: 13.5px;
    }
    input[type=text]::placeholder { color: var(--text-muted); }
    input[type=text]:focus { border-color: var(--header-from); }
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      border: none; color: white;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover  { transform: scale(1.08); }
    .send-btn:active { transform: scale(0.94); }
    .tools-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .upload-btn {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--chip-color);
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn:hover { opacity: 0.8; }
    .upload-status { font-size: 11px; color: #4ade80; }
    .city-input { padding: 5px 12px; border-radius: 99px; font-size: 11px; width: 120px; }
    .city-input::placeholder { color: var(--text-muted); }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
      body { align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- ===== ONBOARDING OVERLAY ===== -->
<div class="onboarding" id="onboarding">
  <div class="onboard-card">
    <div class="big-emoji">🤖</div>
    <h2>Welcome to KevAI</h2>
    <p>Your personal AI buddy. Let's make this yours!</p>
    <p style="font-size:12px; margin-bottom:10px; color:var(--text-muted);">Pick a theme:</p>
    <div class="theme-picker">
      <div class="theme-dot active" data-t="dark"   onclick="pickTheme(this)" title="Dark"></div>
      <div class="theme-dot"        data-t="light"  onclick="pickTheme(this)" title="Light"></div>
      <div class="theme-dot"        data-t="ocean"  onclick="pickTheme(this)" title="Ocean"></div>
      <div class="theme-dot"        data-t="forest" onclick="pickTheme(this)" title="Forest"></div>
      <div class="theme-dot"        data-t="sunset" onclick="pickTheme(this)" title="Sunset"></div>
    </div>
    <input class="onboard-input" id="onboard-name" placeholder="What is your name?"        maxlength="30"/>
    <input class="onboard-input" id="onboard-city" placeholder="Your city (for weather)"   maxlength="30"/>
    <button class="onboard-btn" onclick="startChat()">Let's go! 🔥</button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="avatar-wrap" onclick="toggleThemePanel()">
      <div class="avatar idle" id="avatar">🤖</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-text">
      <h1 id="ai-title">KevAI</h1>
      <p>Personal AI buddy — always online</p>
      <div class="mood-badge" id="mood-badge">😊 Good vibes</div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" onclick="toggleDark()" id="theme-toggle-btn" title="Toggle light/dark">🌙</button>
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
    </div>
  </div>

  <!-- Theme panel (expandable) -->
  <div class="theme-panel" id="theme-panel">
    <span>Theme:</span>
    <div class="tp-dot active" data-t="dark"   onclick="setTheme(this)" title="Dark"></div>
    <div class="tp-dot"        data-t="light"  onclick="setTheme(this)" title="Light"></div>
    <div class="tp-dot"        data-t="ocean"  onclick="setTheme(this)" title="Ocean"></div>
    <div class="tp-dot"        data-t="forest" onclick="setTheme(this)" title="Forest"></div>
    <div class="tp-dot"        data-t="sunset" onclick="setTheme(this)" title="Sunset"></div>
  </div>

  <!-- Briefing bar -->
  <div class="briefing" id="briefing">
    <div class="briefing-row">🌤️ <span id="b-weather">Loading...</span></div>
    <div class="briefing-row">💬 <span id="b-quote">Loading...</span></div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Mode chips -->
  <div class="modes">
    <div class="mode-chip active" onclick="setMode(this,'normal mode')">😎 Normal</div>
    <div class="mode-chip"        onclick="setMode(this,'study mode')">📚 Study</div>
    <div class="mode-chip"        onclick="setMode(this,'motivate me')">🔥 Hype</div>
    <div class="mode-chip"        onclick="setMode(this,'roast me')">😂 Roast</div>
    <div class="mode-chip"        onclick="setMode(this,'chill mode')">😴 Chill</div>
  </div>

  <!-- Input area -->
  <div class="input-wrapper">
    <div class="tools-row">
      <label class="upload-btn">
        📄 PDF
        <input type="file" accept=".pdf" style="display:none" onchange="uploadPDF(this)"/>
      </label>
      <span class="upload-status" id="upload-status"></span>
      <input class="city-input" id="city-input" placeholder="📍 City"/>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Ask me anything..."/>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div><!-- /.container -->

<!-- ===== JAVASCRIPT ===== -->
<script>
  /* ---- State ---- */
  const messagesEl = document.getElementById("messages");
  const avatarEl   = document.getElementById("avatar");
  const moodBadge  = document.getElementById("mood-badge");

  let chatHistory    = [];
  let userName       = "there";
  let userCity       = "Chennai";
  let currentTheme   = "dark";
  let reactionCounts = {};

  /* ---- Data maps ---- */
  const moodMap = {
    neutral:  { emoji: "😊", label: "Good vibes" },
    happy:    { emoji: "🔥", label: "Hyped up!"  },
    stressed: { emoji: "😤", label: "Stressed"   },
    sad:      { emoji: "💙", label: "Feeling down"},
    angry:    { emoji: "😡", label: "Fired up"   },
    bored:    { emoji: "😴", label: "Bored"       }
  };

  const intentLabels = {
    search:    { cls: "intent-search",    label: "🔍 Web search" },
    weather:   { cls: "intent-weather",   label: "🌤️ Weather"    },
    calculate: { cls: "intent-calculate", label: "🔢 Calculator" }
  };

  /* ---- Keyboard shortcut ---- */
  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  /* ---- Auth / init ---- */
  async function checkAuth() {
    const res = await fetch("/me");
    if (res.status === 401) { window.location.href = "/auth"; return; }
    const user = await res.json();
    userName     = user.username;
    userCity     = user.city;
    currentTheme = user.theme;
    document.documentElement.setAttribute("data-theme", currentTheme);
    document.getElementById("city-input").value = userCity;
    document.getElementById("ai-title").textContent = user.ai_name;
    document.getElementById("onboarding").style.display = "none";
    await fetch("/conversations/new", { method: "POST" });
    await loadBriefing(userCity);
    loadConversationList();
  }

  /* ---- Conversation list ---- */
  async function loadConversationList() {
    const res     = await fetch("/conversations");
    const convos  = await res.json();
    const sidebar = document.getElementById("conv-list");
    if (!sidebar) return;
    sidebar.innerHTML = convos.map(c => `
      <div class="conv-item" onclick="loadConvo(${c.id})">
        <div class="conv-title">${c.title}</div>
        <div class="conv-date">${c.created_at}</div>
        ${c.is_shared ? `<div class="conv-shared">🔗 Shared</div>` : ""}
      </div>
    `).join("");
  }

  async function loadConvo(id) {
    const res      = await fetch(`/conversations/${id}`);
    const messages = await res.json();
    messagesEl.innerHTML = "";
    chatHistory = [];
    messages.forEach(m => {
      if (m.role !== "system") {
        addMessage(m.role === "user" ? "user" : "ai", m.content);
        chatHistory.push(m);
      }
    });
  }

  async function shareConvo() {
    const convoId = await getCurrentConvoId();
    if (!convoId) return;
    const res  = await fetch(`/conversations/${convoId}/share`, { method: "POST" });
    const data = await res.json();
    const link = `${window.location.origin}/shared/${data.share_code}`;
    navigator.clipboard.writeText(link);
    alert(`Link copied! Share this with friends:\n${link}`);
  }

  async function logout() {
    await fetch("/logout");
    window.location.href = "/auth";
  }

  /* ---- Avatar animation ---- */
  function setAvatarTalking(talking) {
    avatarEl.classList.remove("talking", "idle");
    avatarEl.classList.add(talking ? "talking" : "idle");
  }

  /* ---- Theme helpers ---- */
  function pickTheme(el) {
    document.querySelectorAll(".theme-dot").forEach(d => d.classList.remove("active"));
    el.classList.add("active");
    currentTheme = el.dataset.t;
    document.documentElement.setAttribute("data-theme", currentTheme);
  }

  function setTheme(el) {
    document.querySelectorAll(".tp-dot").forEach(d => d.classList.remove("active"));
    el.classList.add("active");
    currentTheme = el.dataset.t;
    document.documentElement.setAttribute("data-theme", currentTheme);
    document.getElementById("theme-toggle-btn").textContent = currentTheme === "light" ? "🌙" : "☀️";
  }

  function toggleDark() {
    const next = currentTheme === "light" ? "dark" : "light";
    currentTheme = next;
    document.documentElement.setAttribute("data-theme", next);
    document.getElementById("theme-toggle-btn").textContent = next === "light" ? "🌙" : "☀️";
    document.querySelectorAll(".tp-dot").forEach(d => {
      d.classList.toggle("active", d.dataset.t === next);
    });
  }

  function toggleThemePanel() {
    document.getElementById("theme-panel").classList.toggle("open");
  }

  /* ---- Mood ---- */
  function updateMood(mood) {
    const m = moodMap[mood] || moodMap.neutral;
    moodBadge.textContent = m.emoji + " " + m.label;
  }

  /* ---- Utilities ---- */
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  /* ---- Message rendering ---- */
  function addMessage(role, text, intent) {
    const msgId = "msg-" + Date.now();
    reactionCounts[msgId] = { "👍": 0, "👎": 0, "❤️": 0, "😂": 0 };

    const row = document.createElement("div");
    row.className = "msg-row" + (role === "user" ? " user" : "");

    let intentBadge = "";
    if (intent && intentLabels[intent]) {
      const il = intentLabels[intent];
      intentBadge = `<div class="intent-badge ${il.cls}">${il.label}</div>`;
    }

    let reactionsHTML = "";
    if (role === "ai") {
      reactionsHTML = `
        <div class="reactions" id="${msgId}">
          <button class="react-btn" onclick="react('${msgId}','👍')">👍 <span class="react-count">0</span></button>
          <button class="react-btn" onclick="react('${msgId}','👎')">👎 <span class="react-count">0</span></button>
          <button class="react-btn" onclick="react('${msgId}','❤️')">❤️ <span class="react-count">0</span></button>
          <button class="react-btn" onclick="react('${msgId}','😂')">😂 <span class="react-count">0</span></button>
        </div>`;
    }

    row.innerHTML = role === "user"
      ? `<div class="msg-avatar">👤</div>
         <div class="msg-content">
           <div class="message user-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
         </div>`
      : `<div class="msg-avatar">🤖</div>
         <div class="msg-content">
           ${intentBadge}
           <div class="message ai-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
           ${reactionsHTML}
         </div>`;

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function react(msgId, emoji) {
    const container = document.getElementById(msgId);
    if (!container) return;
    container.querySelectorAll(".react-btn").forEach(btn => {
      if (btn.textContent.startsWith(emoji)) {
        const wasActive = btn.classList.contains("active");
        btn.classList.toggle("active");
        reactionCounts[msgId][emoji] = wasActive ? 0 : 1;
        btn.querySelector(".react-count").textContent = reactionCounts[msgId][emoji];
      }
    });
  }

  /* ---- Typing indicator ---- */
  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";
    row.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    setAvatarTalking(true);
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
    setAvatarTalking(false);
  }

  /* ---- Send message ---- */
  async function sendMessage() {
    const input = document.getElementById("input");
    const text  = input.value.trim();
    if (!text) return;
    input.value = "";
    const city = document.getElementById("city-input").value || userCity;
    addMessage("user", text);
    chatHistory.push({ role: "user", content: text });
    showTyping();
    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: chatHistory, userName, userCity: city })
      });
      const data = await res.json();
      removeTyping();
      addMessage("ai", data.reply, data.intent);
      chatHistory.push({ role: "assistant", content: data.reply });
      if (data.mood) updateMood(data.mood);
    } catch (e) {
      removeTyping();
      addMessage("ai", "Something went wrong 😅 try again!");
    }
  }

  /* ---- Mode chips ---- */
  function setMode(el, mode) {
    document.querySelectorAll(".mode-chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("input").value = mode;
    sendMessage();
  }

  /* ---- Clear chat ---- */
  function clearChat() {
    chatHistory = [];
    messagesEl.innerHTML = "";
    addMessage("ai", `Fresh start! What's on your mind, ${userName}? 🔥`);
    updateMood("neutral");
  }

  /* ---- PDF upload ---- */
  async function uploadPDF(input) {
    const file     = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById("upload-status");
    statusEl.textContent = "Uploading...";
    const formData = new FormData();
    formData.append("file", file);
    try {
      const res  = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (data.success) {
        statusEl.textContent = `✅ ${file.name}`;
        addMessage("ai", `Got your PDF! 📄 ${data.pages} pages loaded. Ask me anything about it!`);
      } else {
        statusEl.textContent = "❌ Failed";
      }
    } catch (e) {
      statusEl.textContent = "❌ Error";
    }
  }

  /* ---- Briefing ---- */
  async function loadBriefing(city) {
    try {
      const res  = await fetch(`/briefing?city=${city}`);
      const data = await res.json();
      document.getElementById("b-weather").textContent = data.weather;
      document.getElementById("b-quote").textContent   = data.quote;
      addMessage("ai", `${data.greeting}, ${userName}! 👋 ${data.weather} — ${data.quote} What's good today? 🔥`);
    } catch (e) {
      addMessage("ai", `Hey ${userName}! I'm KevAI 🤖 Your personal AI buddy. What's good today?`);
    }
  }

  /* ---- Onboarding ---- */
  function startChat() {
    const nameInput = document.getElementById("onboard-name").value.trim();
    const cityInput = document.getElementById("onboard-city").value.trim();
    userName = nameInput || "there";
    userCity = cityInput || "Chennai";
    document.getElementById("city-input").value = userCity;
    document.getElementById("ai-title").textContent = `${userName}'s AI`;
    document.getElementById("onboarding").style.display = "none";
    loadBriefing(userCity);
  }

  /* ---- Bootstrap ---- */
  window.onload = checkAuth;
  // PWA Service Worker Registration
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(reg => console.log("App ready to install!"))
      .catch(err => console.log("SW Error:", err));
  });
}

// Install button logic
let deferredPrompt;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById("install-btn");
  if (btn) {
    btn.style.display = "flex";
    btn.style.animation = "pulse 1.5s infinite";
  }
});

window.addEventListener("appinstalled", () => {
  const btn = document.getElementById("install-btn");
  if (btn) btn.style.display = "none";
  deferredPrompt = null;
});

async function installApp() {
  if (!deferredPrompt) {
    alert("To install: tap your browser menu and select Add to Home Screen!");
    return;
  }
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("install-btn").style.display = "none";
}

  
</script>
</body>
</html>
