<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KevAI</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Inter",sans-serif; background:#0a0a0f; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    .bg-glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(108,63,197,0.15),transparent 70%); top:-150px; left:50%; transform:translateX(-50%); pointer-events:none; }
    .container { width:420px; height:760px; background:rgba(20,20,30,0.97); border-radius:24px; display:flex; flex-direction:column; overflow:hidden; border:1px solid rgba(108,63,197,0.3); box-shadow:0 0 60px rgba(108,63,197,0.2); position:relative; z-index:1; }

    /* Header */
    .header { background:linear-gradient(135deg,#6c3fc5,#4a2d8a); padding:14px 18px; display:flex; align-items:center; gap:12px; }
    .avatar-wrap { position:relative; }
    .avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid rgba(255,255,255,0.3); }
    .status-dot { width:10px; height:10px; background:#4ade80; border-radius:50%; position:absolute; bottom:1px; right:1px; border:2px solid #4a2d8a; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    .header-text { flex:1; }
    .header-text h1 { color:white; font-size:15px; font-weight:600; }
    .header-text p { color:rgba(255,255,255,0.6); font-size:11px; margin-top:1px; }
    .mood-badge { font-size:11px; padding:3px 10px; border-radius:99px; background:rgba(255,255,255,0.15); color:white; margin-top:3px; display:inline-block; transition:all 0.3s; }
    .icon-btn { background:rgba(255,255,255,0.15); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .icon-btn:hover { background:rgba(255,255,255,0.28); }

    /* Briefing */
    .briefing { background:rgba(108,63,197,0.12); border-bottom:1px solid rgba(108,63,197,0.2); padding:10px 16px; display:flex; flex-direction:column; gap:4px; }
    .briefing-row { display:flex; align-items:center; gap:8px; font-size:12px; color:#a78bfa; }
    .briefing-row span { color:#ddd; }

    /* Messages */
    .messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
    .messages::-webkit-scrollbar { width:3px; }
    .messages::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
    .msg-row { display:flex; align-items:flex-end; gap:8px; animation:fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction:row-reverse; }
    .msg-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; background:rgba(108,63,197,0.3); }
    .msg-row.user .msg-avatar { background:rgba(108,63,197,0.5); }
    .msg-content { display:flex; flex-direction:column; gap:3px; max-width:75%; }
    .msg-row.user .msg-content { align-items:flex-end; }
    .message { padding:9px 13px; border-radius:18px; font-size:13.5px; line-height:1.5; word-break:break-word; }
    .user-msg { background:linear-gradient(135deg,#6c3fc5,#8b5cf6); color:white; border-bottom-right-radius:4px; }
    .ai-msg { background:rgba(255,255,255,0.07); color:#e8e8f0; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.08); }
    .msg-time { font-size:10px; color:#444; padding:0 4px; }

    /* Mood colors */
    .mood-stressed .ai-msg { border-color:rgba(251,191,36,0.3); background:rgba(251,191,36,0.06); }
    .mood-sad .ai-msg { border-color:rgba(96,165,250,0.3); background:rgba(96,165,250,0.06); }
    .mood-happy .ai-msg { border-color:rgba(74,222,128,0.3); background:rgba(74,222,128,0.06); }
    .mood-angry .ai-msg { border-color:rgba(248,113,113,0.3); background:rgba(248,113,113,0.06); }
    .mood-bored .ai-msg { border-color:rgba(167,139,250,0.3); background:rgba(167,139,250,0.06); }

    /* Typing */
    .typing-row { display:flex; align-items:flex-end; gap:8px; }
    .typing-bubble { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.08); padding:11px 15px; border-radius:18px; border-bottom-left-radius:4px; display:flex; gap:5px; align-items:center; }
    .dot { width:6px; height:6px; background:#6c3fc5; border-radius:50%; animation:bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Mode chips */
    .modes { display:flex; gap:6px; padding:0 14px 8px; overflow-x:auto; flex-shrink:0; }
    .modes::-webkit-scrollbar{display:none}
    .mode-chip { background:rgba(108,63,197,0.12); border:1px solid rgba(108,63,197,0.25); color:#a78bfa; padding:5px 12px; border-radius:99px; font-size:11px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
    .mode-chip:hover { background:rgba(108,63,197,0.28); color:white; }
    .mode-chip.active { background:rgba(108,63,197,0.4); color:white; border-color:#8b5cf6; }

    /* Input */
    .input-area { padding:10px 14px 14px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:8px; align-items:center; }
    input { flex:1; padding:11px 15px; border-radius:99px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:white; font-size:13.5px; outline:none; font-family:"Inter",sans-serif; transition:border 0.2s; }
    input::placeholder{color:#444}
    input:focus { border-color:rgba(108,63,197,0.6); }
    .send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#6c3fc5,#8b5cf6); border:none; color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; flex-shrink:0; }
    .send-btn:hover{transform:scale(1.08)} .send-btn:active{transform:scale(0.94)}

    .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
    .empty-state .big-emoji { font-size:36px; margin-bottom:6px; }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">

  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar">🤖</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-text">
      <h1>KevAI</h1>
      <p>Your personal AI buddy — always online</p>
      <div class="mood-badge" id="mood-badge">😊 Good vibes</div>
    </div>
    <button class="icon-btn" onclick="clearChat()" title="Clear">🗑️</button>
  </div>

  <div class="briefing" id="briefing">
    <div class="briefing-row">🌤️ <span id="weather">Loading weather...</span></div>
    <div class="briefing-row">💬 <span id="quote">Loading quote...</span></div>
    <div class="briefing-row">🤯 <span id="fact">Loading fun fact...</span></div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-emoji">👋</div>
      <div style="color:#666;font-weight:500;font-size:14px;">Hey Kevin! What is good?</div>
      <div style="color:#444;font-size:12px;">I am always here bro</div>
    </div>
  </div>

  <div class="modes">
    <div class="mode-chip active" onclick="setMode(this,'normal mode')">😎 Normal</div>
    <div class="mode-chip" onclick="setMode(this,'study mode')">📚 Study</div>
    <div class="mode-chip" onclick="setMode(this,'motivate me')">🔥 Hype</div>
    <div class="mode-chip" onclick="setMode(this,'roast me')">😂 Roast</div>
    <div class="mode-chip" onclick="setMode(this,'chill mode')">😴 Chill</div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Say something..."/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById("messages");
  const moodBadge = document.getElementById("mood-badge");
  let chatHistory = [];

  const moodMap = {
    neutral:  { emoji:"😊", label:"Good vibes",  cls:"" },
    happy:    { emoji:"🔥", label:"Hyped up!",   cls:"mood-happy" },
    stressed: { emoji:"😤", label:"Stressed",    cls:"mood-stressed" },
    sad:      { emoji:"💙", label:"Feeling down",cls:"mood-sad" },
    angry:    { emoji:"😤", label:"Fired up",    cls:"mood-angry" },
    bored:    { emoji:"😴", label:"Bored",       cls:"mood-bored" }
  };

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  function getTime() {
    return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  }

  function removeEmpty() {
    const e = document.getElementById("empty-state");
    if (e) e.remove();
  }

  function updateMood(mood) {
    const m = moodMap[mood] || moodMap.neutral;
    moodBadge.textContent = m.emoji + " " + m.label;
    messagesEl.className = "messages " + m.cls;
  }

  function addMessage(role, text) {
    removeEmpty();
    const row = document.createElement("div");
    row.className = "msg-row" + (role === "user" ? " user" : "");
    row.innerHTML = role === "user"
      ? `<div class="msg-avatar">👤</div>
         <div class="msg-content">
           <div class="message user-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
         </div>`
      : `<div class="msg-avatar">🤖</div>
         <div class="msg-content">
           <div class="message ai-msg">${text}</div>
           <div class="msg-time">${getTime()}</div>
         </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";
    row.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    addMessage("user", text);
    chatHistory.push({"role":"user","content":text});
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ message: text, history: chatHistory })
      });
      const data = await res.json();
      removeTyping();
      addMessage("ai", data.reply);
      chatHistory.push({"role":"assistant","content":data.reply});
      if (data.mood) updateMood(data.mood);
    } catch(e) {
      removeTyping();
      addMessage("ai", "Bro something went wrong 😅 try again!");
    }
  }

  function setMode(el, mode) {
    document.querySelectorAll(".mode-chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("input").value = mode;
    sendMessage();
  }

  function clearChat() {
    chatHistory = [];
    messagesEl.innerHTML = `<div class="empty-state" id="empty-state">
      <div class="big-emoji">👋</div>
      <div style="color:#666;font-weight:500;font-size:14px;">Fresh start! What is good?</div>
    </div>`;
    updateMood("neutral");
  }

  async function loadBriefing() {
    try {
      const res = await fetch("/briefing");
      const data = await res.json();
      document.getElementById("weather").textContent = data.weather;
      document.getElementById("quote").textContent = data.quote;
      document.getElementById("fact").textContent = data.fact;
      addMessage("ai", `${data.greeting} Kevin! 👋 Here is your daily briefing — ${data.weather}. Quote of the day: ${data.quote}. Fun fact: ${data.fact} Now what is on your mind? 🔥`);
    } catch(e) {
      document.getElementById("weather").textContent = "Unavailable";
      document.getElementById("quote").textContent = "Unavailable";
      document.getElementById("fact").textContent = "Unavailable";
      addMessage("ai", "Yooo Kevin! I am KevAI 🤖 Your personal AI buddy. What is good today?");
    }
  }

  loadBriefing();
</script>
</body>
</html>
